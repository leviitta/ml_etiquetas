steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/app:latest || true
    docker build --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/app:latest \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/app:${_IMAGE_TAG} \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/app:latest .
  env:
    - 'DOCKER_BUILDKIT=1'
images:
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/app:${_IMAGE_TAG}'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/app:latest'
