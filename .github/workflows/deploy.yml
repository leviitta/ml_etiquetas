name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - GCP_orquestration_improvement
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mypassword123
          POSTGRES_DB: mldb
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Ruff check
        run: uv run ruff check .
        continue-on-error: true

      - name: Run tests with real DB
        env:
          TESTING_WITH_REAL_DB: "1"
          DATABASE_URL: postgresql://postgres:mypassword123@localhost:5432/mldb
          SECRET_KEY: test-secret
          MP_ACCESS_TOKEN: test-token
        run: uv run pytest

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # NOTE: el audience de WIF exige el project NUMBER, no el project ID.
          workload_identity_provider: projects/890639424998/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: ml-etiquetas-deploy-sa@ml-etiquetas.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-tf-state"
        working-directory: terraform

      - name: Terraform Targeted Apply (Registry and IAM)
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_mp_access_token: ${{ secrets.MP_ACCESS_TOKEN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform apply -target=google_artifact_registry_repository.repo -target=google_project_iam_member.sa_ar_writer -auto-approve
        working-directory: terraform

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            us-central1-docker.pkg.dev/ml-etiquetas/ml-etiquetas-repo/app:${{ github.sha }}
            us-central1-docker.pkg.dev/ml-etiquetas/ml-etiquetas-repo/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Terraform Plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_mp_access_token: ${{ secrets.MP_ACCESS_TOKEN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan -out=tfplan -var="image_tag=${{ github.sha }}"
        working-directory: terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan
        working-directory: terraform
